# ============================================
# DualBoard ? Application Configuration
# ============================================

spring.application.name=dualboard

# Default to dev profile (H2). Override with --spring.profiles.active=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ---- PostgreSQL (used when profile is NOT dev) ----
spring.datasource.url=jdbc:postgresql://localhost:5432/dualboard
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate: auto-create tables from entities (use 'validate' in production)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Dialect is auto-detected ? do NOT set explicitly (Hibernate 7 warning)

# ---- OAuth 2.0: GitHub ----

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# ---- OAuth 2.0: Google ----


spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}


# ---- Server ----
server.port=8080
