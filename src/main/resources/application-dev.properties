# ============================================
# DualBoard ? DEV Profile (H2 in-memory DB)
# ============================================
# Activate with: --spring.profiles.active=dev
# This lets you develop and test without a PostgreSQL instance.

# ---- H2 In-Memory Database ----
spring.datasource.url=jdbc:h2:mem:dualboard;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 web console for debugging (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate: create-drop for dev (fresh DB each restart)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

