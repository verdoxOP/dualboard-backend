version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dualboard-db
    environment:
      POSTGRES_DB: dualboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - dualboard-data:/var/lib/postgresql/data

volumes:
  dualboard-data:

